name: Publish Examples
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch/minor/major)'
        default: 'patch'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm build:examples

      - name: Version & publish each example
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in examples/*/; do
            if [ -f "$dir/package.json" ] && [ -d "$dir/dist" ]; then
              private=$(node -p "require('./$dir/package.json').private || false")
              if [ "$private" = "true" ]; then
                echo "Skipping $dir (private)"
                continue
              fi
              (cd "$dir" && npm version ${{ inputs.version }} --no-git-tag-version && npm publish --access public)
            fi
          done
