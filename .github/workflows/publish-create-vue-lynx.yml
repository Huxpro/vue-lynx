name: Publish create-vue-lynx
on:
  push:
    tags:
      - 'create-vue-lynx@*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - name: Build create-vue-lynx
        run: pnpm --filter create-vue-lynx run build

      - name: Publish create-vue-lynx
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/create-vue-lynx
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            TAG=$(echo "$VERSION" | sed 's/[0-9]*\.[0-9]*\.[0-9]*-\(.*\)\.[0-9]*/\1/')
            pnpm publish --access public --tag "$TAG" --no-git-checks
          else
            pnpm publish --access public --no-git-checks
          fi
