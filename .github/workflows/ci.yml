name: CI

on:
  push:
    branches: [main, research/vue-lynx]
  pull_request:
    branches: [main, research/vue-lynx]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

  changeset-check:
    name: Changeset Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - name: Check for changesets
        run: pnpm changeset status --since=origin/main

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm lint

  test:
    name: Test - Pipeline
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

      - name: Run pipeline tests (testing-library)
        run: pnpm test

  test-upstream:
    name: Test - Vue Upstream
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

      - name: Clone vuejs/core@v3.6.0-beta.17
        run: pnpm --filter vue-lynx-upstream-tests vuejs:init

      - name: Run upstream Vue tests (runtime-core, reactivity, runtime-dom)
        run: pnpm test:upstream

  test-dev-smoke:
    name: Test - Dev Smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

      - name: Run examples/basic dev smoke test
        run: pnpm test:dev-smoke

  examples-web:
    name: Examples - Lynx for Web (VDOM + Vapor)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      # The harness depends on playwright-core (no test runner), whose CLI
      # provides the same browser installer.
      - run: pnpm --dir packages/example-harness exec playwright-core install --with-deps chromium
      - run: pnpm build
      - run: pnpm examples:inventory
      - name: Build all VDOM examples
        run: pnpm --filter './examples/*' --workspace-concurrency=2 run build
      - run: pnpm examples:build:vapor
      - run: pnpm --dir website build
      - run: pnpm examples:verify:web -- --mode all
      - run: pnpm examples:verify:status

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: example-harness-web
          path: artifacts/example-harness
          if-no-files-found: ignore
