name: CI

on:
  push:
    branches: [main, research/vue-lynx]
  pull_request:
    branches: [main, research/vue-lynx]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

  check-links:
    name: Check Links
    runs-on: ubuntu-latest
    # External sites may be down or block CI — advisory only
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check for broken external links in docs
        run: node scripts/check-links.mjs

  changeset-check:
    name: Changeset Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - name: Check for changesets
        run: pnpm changeset status --since=origin/main

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm lint

  test:
    name: Test - Pipeline
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

      - name: Run pipeline tests (testing-library)
        run: pnpm test

  test-upstream:
    name: Test - Vue Upstream
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

      - name: Clone vuejs/core@v3.5.12
        run: git clone --depth 1 --branch v3.5.12 https://github.com/vuejs/core.git packages/upstream-tests/core

      - name: Run upstream Vue tests (runtime-core, reactivity, runtime-dom)
        run: pnpm test:upstream

  test-dev-smoke:
    name: Test - Dev Smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

      - name: Run examples/basic dev smoke test
        run: pnpm test:dev-smoke
